<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciar Usuários — GBS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f6f4;color:#1a2a1a;font-size:13px}
.hdr{background:#1a4a1a;color:#fff;padding:10px 24px;display:flex;align-items:center;gap:12px}
.hdr-logo{width:28px;height:28px;background:#2d7a2d;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#c8e8c8;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:500;color:#c8e8c8;flex:1}
.hdr-back{background:none;border:0.5px solid #4a7a4a;color:#90c090;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;text-decoration:none}
.content{max-width:1000px;margin:0 auto;padding:24px 20px}
.section{background:#fff;border:0.5px solid #c0dcc0;border-radius:10px;margin-bottom:20px;overflow:hidden}
.section-hdr{background:#1a4a1a;color:#c0e8c0;padding:10px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.section-body{padding:16px}
/* FORM NOVO USUÁRIO */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:10px;color:#4a7a4a;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select{border:0.5px solid #a0c8a0;border-radius:5px;padding:6px 10px;font-size:13px;background:#f8fbf8;color:#1a2a1a;height:32px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#2d7a2d}
.form-full{grid-column:1/-1}
.checkboxes{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.cb-item{display:flex;align-items:center;gap:6px;background:#f0f8f0;border:0.5px solid #a0c8a0;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:12px;color:#1a4a1a}
.cb-item input{accent-color:#2d7a2d;width:14px;height:14px;cursor:pointer}
.btn-criar{background:#2d7a2d;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer;margin-top:12px}
.btn-criar:hover{background:#1a5a1a}
.btn-criar:disabled{background:#90c090;cursor:not-allowed}
.msg-criar{font-size:12px;margin-top:8px;min-height:16px}
.msg-criar.ok{color:#16a34a}
.msg-criar.erro{color:#a32d2d}
/* TABELA USUÁRIOS */
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:#1a4a1a;color:#c0e8c0;padding:8px 10px;text-align:left;font-size:14px;font-weight:500;white-space:nowrap}
tbody tr:nth-child(even){background:#f8fbf8}
tbody td{padding:9px 10px;border-bottom:0.5px solid #e0eee0;vertical-align:middle}
.badge-perfil{display:inline-block;padding:3px 10px;border-radius:8px;font-size:14px;font-weight:500}
.bp-gestor{background:#eeedfe;color:#3c3489}
.bp-supervisor{background:#e6f1fb;color:#0c447c}
.bp-auxiliar{background:#faeeda;color:#633806}
.bp-gestor1{background:#e0d4fa;color:#5b21a8}
.bp-supgeral{background:#fde8e8;color:#9b1c1c}
.bp-tecseg{background:#eaf3de;color:#27500a}
.bp-analista{background:#e0f2f1;color:#00695c}
.badge-ativo{display:inline-block;padding:3px 10px;border-radius:8px;font-size:14px;font-weight:500}
.ba-sim{background:#eaf3de;color:#27500a}
.ba-nao{background:#fcebeb;color:#791f1f}
.btn-edit{background:none;border:0.5px solid #a0c8a0;border-radius:4px;padding:4px 12px;font-size:14px;cursor:pointer;color:#1a4a1a}
.btn-edit:hover{background:#f0f8f0}
.btn-toggle{background:none;border:0.5px solid #f09595;border-radius:4px;padding:4px 12px;font-size:14px;cursor:pointer;color:#a32d2d}
.btn-toggle.ativar{border-color:#a0c8a0;color:#1a4a1a}
/* MODAL EDIÇÃO */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.vis{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:12px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-size:15px;font-weight:500;color:#1a2a1a;margin-bottom:16px}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;color:#4a7a4a;cursor:pointer}
.btn-salvar{background:#2d7a2d;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer;margin-top:12px}
.btn-salvar:disabled{background:#90c090;cursor:not-allowed}
.msg-edit{font-size:12px;margin-top:8px;min-height:16px}
.msg-edit.ok{color:#16a34a}
.msg-edit.erro{color:#a32d2d}
.status-msg{padding:16px;text-align:center;color:#4a7a4a}
</style>
</head>
<body>
<div class="hdr">
  <img src="../jornada/logo_gbs.png" alt="GBS" style="height:36px" onerror="this.style.display='none'">
  <div class="hdr-title">Gerenciar Usuários</div>
  <a class="hdr-back" href="https://gbsservicos.com/controles">🏠 Portal</a>
</div>

<div class="content">
  <!-- CRIAR USUÁRIO -->
  <div class="section">
    <div class="section-hdr">Criar novo usuário</div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Nome completo</label>

          <label>E-mail</label>

        </div>
        <div class="form-group">
          <label>Senha inicial</label>
          <input type="password" id="n-senha" placeholder="mínimo 6 caracteres">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:6px;padding-top:18px">
          <input type="checkbox" id="n-trocar-senha" checked style="width:auto">
          <label style="margin:0;font-size:12px">Exigir troca de senha no primeiro acesso</label>
        </div>
        <div class="form-group">
          <label>Perfil</label>
          <select id="n-perfil" onchange="atualizarBase()">
            <option value="supervisor">Supervisor</option>

            <option value="analista">Analista</option>

        <div class="form-group" id="grp-base">
          <label>Base</label>
          <select id="n-base">
            <option value="">Todas (sem restrição)</option>

        </div>
        <div class="form-group form-full">
          <label>Relatórios permitidos</label>
          <div class="checkboxes">
            <label class="cb-item"><input type="checkbox" value="jornada" checked> Jornada</label>
            <label class="cb-item"><input type="checkbox" value="impedimentos" checked> Impedimentos</label>
            <label class="cb-item"><input type="checkbox" value="transmissoes" checked> Transmissões</label>
            <label class="cb-item"><input type="checkbox" value="fotos" checked> Fotos</label>
            <label class="cb-item"><input type="checkbox" value="erros" checked> Erros</label>
            <label class="cb-item"><input type="checkbox" value="velocidade" checked> Velocidade</label>
            <label class="cb-item"><input type="checkbox" value="km" checked> KM Rodado</label>
            <label class="cb-item"><input type="checkbox" value="ranking" checked> Ranking</label>
            <label class="cb-item"><input type="checkbox" value="tratativas"> Tratativas</label>
            <label class="cb-item"><input type="checkbox" value="leiturista-admin"> Gerenciar Leituristas</label>
            <label class="cb-item"><input type="checkbox" value="locacao-motos"> Locação de Motos</label>
          </div>
        </div>
      </div>
      <button class="btn-criar" id="btn-criar" onclick="criarUsuario()">Criar usuário</button>
      <div class="msg-criar" id="msg-criar"></div>
    </div>
  </div>

  <!-- LISTA USUÁRIOS -->
  <div class="section">
    <div class="section-hdr">
      <span>Usuários cadastrados</span>
      <div style="display:flex;align-items:center;gap:12px">
        <span id="count-users" style="font-size:11px;color:#90c090"></span>
        <button onclick="dispararBoasVindas()" id="btn-boas-vindas" style="background:#2d7a2d;color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px">✉️ Enviar e-mail de boas-vindas a todos</button>
      </div>
    </div>
    <div id="msg-boas-vindas" style="padding:8px 16px;font-size:12px;color:#4a7a4a"></div>
    <div class="section-body" style="padding:0;overflow-x:auto">
      <table>
        <thead><tr>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Perfil</th>
          <th>Base</th>
          <th>Relatórios</th>
          <th>Status</th>
          <th>Último acesso</th>
          <th>Ações</th>
        </tr></thead>
        <tbody id="tbody-users"><tr><td colspan="8" class="status-msg">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL EDIÇÃO -->
<div class="modal-overlay" id="modal-edit" onclick="fecharModalFora(event)">
  <div class="modal">
    <button class="modal-close" onclick="fecharModal()">×</button>
    <div class="modal-title">Editar usuário</div>
    <input type="hidden" id="e-id">
    <input type="hidden" id="e-email-atual">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="e-nome">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="e-email" placeholder="email@gbsservicos.com">
      </div>
      <div class="form-group">
        <label>Perfil</label>
        <select id="e-perfil" onchange="atualizarBaseEdit()">
          <option value="supervisor">Supervisor</option>
          <option value="auxiliar">Auxiliar</option>
          <option value="analista">Analista</option>
          <option value="gestor">Gestor</option>
          <option value="gestor1">Gestor1</option>
          <option value="supervisor_geral">Supervisor Geral</option>
          <option value="tst_passos">TST - Passos</option>
          <option value="tst_pouso_alegre">TST - Pouso Alegre</option>
        </select>
      </div>
      <div class="form-group" id="e-grp-base">
        <label>Base</label>
        <select id="e-base">
          <option value="">Todas (sem restrição)</option>
          <option>ALFENAS</option>
          <option>ANDRADAS</option>
          <option>GUAXUPE</option>
          <option>OURO FINO</option>
          <option>PASSOS</option>
          <option>POUSO ALEGRE</option>
          <option>SSP</option>
        </select>
      </div>
      <div class="form-group form-full">
        <label>Nova senha (deixe em branco para não alterar)</label>
        <input type="password" id="e-senha" placeholder="nova senha (opcional)">
      </div>
      <div class="form-group form-full" style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" id="e-trocar-senha" style="width:auto">
        <label style="margin:0;font-size:12px">Exigir troca de senha no próximo login</label>
      </div>
      <div class="form-group form-full">
        <label>Relatórios permitidos</label>
        <div class="checkboxes" id="e-relatorios">
          <label class="cb-item"><input type="checkbox" value="jornada"> Jornada</label>
          <label class="cb-item"><input type="checkbox" value="impedimentos"> Impedimentos</label>
          <label class="cb-item"><input type="checkbox" value="transmissoes"> Transmissões</label>
          <label class="cb-item"><input type="checkbox" value="fotos"> Fotos</label>
          <label class="cb-item"><input type="checkbox" value="erros"> Erros</label>
          <label class="cb-item"><input type="checkbox" value="velocidade"> Velocidade</label>
          <label class="cb-item"><input type="checkbox" value="km"> KM Rodado</label>
          <label class="cb-item"><input type="checkbox" value="ranking"> Ranking</label>
          <label class="cb-item"><input type="checkbox" value="tratativas"> Tratativas</label>
          <label class="cb-item"><input type="checkbox" value="leiturista-admin"> Gerenciar Leituristas</label>
          <label class="cb-item"><input type="checkbox" value="locacao-motos"> Locação de Motos</label>
        </div>

    </div>
    <button class="btn-salvar" id="btn-salvar" onclick="salvarEdicao()">Salvar alterações</button>
    <div class="msg-edit" id="msg-edit"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://ndwivbhqglpnfyqwjbzu.supabase.co';
const SUPABASE_KEY='sb_publishable_IhuNziyT5VYrMKRixcPGjA_LAn5ku-7';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// Verificar acesso gestor
(async()=>{
  const {data:{user}}=await sb.auth.getUser();
  if(!user){location.href='index.html';return;}
  const {data:up}=await sb.from('usuarios_portal').select('perfil,ativo').eq('id',user.id).single();
  if(!up||!['gestor','gestor1','supervisor_geral'].includes(up.perfil)||!up.ativo){location.href='index.html';return;}
  carregarUsuarios();
})();

const SEM_BASE=['gestor','gestor1','supervisor_geral','tst_passos','tst_pouso_alegre'];
function atualizarBase(){
  const p=document.getElementById('n-perfil').value;
  document.getElementById('grp-base').style.display=SEM_BASE.includes(p)?'none':'flex';
}
function atualizarBaseEdit(){
  const p=document.getElementById('e-perfil').value;
  document.getElementById('e-grp-base').style.display=SEM_BASE.includes(p)?'none':'flex';
}

async function dispararBoasVindas(){
  const btn=document.getElementById('btn-boas-vindas');
  const msg=document.getElementById('msg-boas-vindas');
  const senhaTemp=prompt('Qual a senha provisória que você cadastrou pra todos? (será mencionada no e-mail)','GBS@2026');
  if(!senhaTemp) return;
  if(!confirm(`Isso vai enviar um e-mail de boas-vindas pra TODOS os usuários ativos, informando a senha "${senhaTemp}" e marcando que precisam trocá-la no próximo login.\n\nConfirma o envio?`)) return;

  btn.disabled=true; btn.textContent='Enviando...';
  const {data:usuarios}=await sb.from('usuarios_portal').select('id,nome,email').eq('ativo',true);
  if(!usuarios||!usuarios.length){ msg.textContent='Nenhum usuário ativo encontrado.'; btn.disabled=false; btn.textContent='✉️ Enviar e-mail de boas-vindas a todos'; return; }

  let enviados=0, falhas=0;
  for(const u of usuarios){
    try{
      await sb.from('usuarios_portal').update({deve_trocar_senha:true}).eq('id',u.id);
      const corpo=`
<div style="font-family:system-ui,sans-serif;max-width:500px;margin:0 auto;color:#1a2a1a">
  <div style="background:#1a4a1a;padding:14px 20px;border-radius:8px 8px 0 0">
    <span style="color:#c8e8c8;font-weight:500;font-size:15px">GBS Serviços — Gestão de Controles</span>
  </div>
  <div style="background:#fff;border:0.5px solid #c0dcc0;padding:20px;border-radius:0 0 8px 8px">
    <p style="margin-bottom:14px">Olá, <strong>${u.nome}</strong>!</p>
    <p style="margin-bottom:14px">Seja bem-vindo(a) ao sistema de Controles GBS. Suas credenciais de acesso são:</p>
    <table style="width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px">
      <tr><td style="padding:6px 10px;border:0.5px solid #c0dcc0;background:#f8fbf8;font-weight:500;width:35%">Usuário (e-mail)</td><td style="padding:6px 10px;border:0.5px solid #c0dcc0">${u.email}</td></tr>
      <tr><td style="padding:6px 10px;border:0.5px solid #c0dcc0;background:#f8fbf8;font-weight:500">Senha provisória</td><td style="padding:6px 10px;border:0.5px solid #c0dcc0">${senhaTemp}</td></tr>
    </table>
    <p style="margin-bottom:16px">Por segurança, ao entrar pela primeira vez o sistema vai pedir pra você <strong>criar uma senha própria</strong> — a senha acima só serve pra esse primeiro acesso.</p>
    <div style="text-align:center;margin-bottom:20px">
      <a href="https://gbsservicos.com" style="background:#2d7a2d;color:#fff;padding:10px 28px;border-radius:6px;text-decoration:none;font-weight:500;font-size:13px">ACESSAR O SISTEMA</a>
    </div>
    <p style="font-size:11px;color:#4a7a4a;border-top:0.5px solid #c0dcc0;padding-top:12px">At.te<br><strong>Gestão de Controles</strong></p>
  </div>
</div>`;
      const r=await fetch(`${SUPABASE_URL}/functions/v1/enviar-email`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
        body:JSON.stringify({para:u.email,assunto:'Bem-vindo ao Sistema de Controles GBS',corpo})
      });
      if(r.ok) enviados++; else falhas++;
    }catch(e){ falhas++; }
  }
  msg.textContent=`✓ ${enviados} e-mail(s) enviado(s)${falhas?`, ${falhas} falha(s)`:''}.`;
  btn.disabled=false; btn.textContent='✉️ Enviar e-mail de boas-vindas a todos';
}

async function carregarUsuarios(){
  const {data}=await sb.from('usuarios_portal').select('*').order('nome');
  document.getElementById('count-users').textContent=`${(data||[]).length} usuário(s)`;
  const LABEL={gestor:'Gestor',supervisor:'Supervisor',auxiliar:'Auxiliar',analista:'Analista',gestor1:'Gestor1',supervisor_geral:'Supervisor Geral',tst_passos:'TST - Passos',tst_pouso_alegre:'TST - Pouso Alegre'};
  const CLASSE={gestor:'bp-gestor',supervisor:'bp-supervisor',auxiliar:'bp-auxiliar',analista:'bp-analista',gestor1:'bp-gestor1',supervisor_geral:'bp-supgeral',tst_passos:'bp-tecseg',tst_pouso_alegre:'bp-tecseg'};
  // tst_passos/tst_pouso_alegre não usam a coluna "base" — a restrição deles
  // é por essa lista fixa, replicada dos módulos (km, jornada, etc). Mostrar
  // "Todas" pra eles aqui seria enganoso, já que o acesso é restrito mesmo.
  const TST_BASES={tst_passos:['Guaxupé','Passos','SSP'],tst_pouso_alegre:['Pouso Alegre','Alfenas','Ouro Fino','Andradas']};
  document.getElementById('tbody-users').innerHTML=(data||[]).map(u=>`
    <tr>
      <td><strong>${u.nome}</strong></td>
      <td style="color:#4a7a4a">${u.email}</td>
      <td><span class="badge-perfil ${CLASSE[u.perfil]||''}">${LABEL[u.perfil]||u.perfil}</span></td>
      <td>${u.base||(TST_BASES[u.perfil]?TST_BASES[u.perfil].join(', '):'Todas')}</td>
      <td style="font-size:14px;color:#4a7a4a">${(u.relatorios||[]).join(', ')||'—'}</td>
      <td><span class="badge-ativo ${u.ativo?'ba-sim':'ba-nao'}">${u.ativo?'Ativo':'Inativo'}</span></td>
      <td style="font-size:14px;color:#4a7a4a;white-space:nowrap">${u.last_login?new Date(u.last_login).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'Nunca acessou'}</td>
      <td style="display:flex;gap:6px;align-items:center">
        <button class="btn-edit" onclick='abrirEdicao(${JSON.stringify(u)})'>Editar</button>
        <button class="btn-toggle ${u.ativo?'':'ativar'}" onclick="toggleAtivo('${u.id}',${u.ativo})">${u.ativo?'Desativar':'Ativar'}</button>
      </td>
    </tr>`).join('');
}

const EDGE_FN_URL = `${SUPABASE_URL}/functions/v1/admin-usuarios`;

async function chamarAdminFn(payload){
  const {data:{session}}=await sb.auth.getSession();
  const resp=await fetch(EDGE_FN_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${session?.access_token||''}`},
    body:JSON.stringify(payload)
  });
  return resp.json();
}

async function criarUsuario(){
  const nome=document.getElementById('n-nome').value.trim();
  const email=document.getElementById('n-email').value.trim();
  const senha=document.getElementById('n-senha').value;
  const perfil=document.getElementById('n-perfil').value;
  const base=document.getElementById('n-base').value||null;
  const rels=[...document.querySelectorAll('.checkboxes input:checked')].map(c=>c.value);
  const exigirTroca=document.getElementById('n-trocar-senha').checked;
  const msg=document.getElementById('msg-criar');
  const btn=document.getElementById('btn-criar');

  if(!nome||!email||!senha){msg.className='msg-criar erro';msg.textContent='Preencha nome, e-mail e senha.';return;}
  if(senha.length<6){msg.className='msg-criar erro';msg.textContent='Senha mínima de 6 caracteres.';return;}

  btn.disabled=true;msg.textContent='Criando...';msg.className='msg-criar';

  const resultado=await chamarAdminFn({action:'create_user',nome,email,senha,perfil,base,relatorios:rels});

  if(resultado.error){
    msg.className='msg-criar erro';msg.textContent='Erro: '+resultado.error;btn.disabled=false;return;
  }

  if(exigirTroca){
    await sb.from('usuarios_portal').update({deve_trocar_senha:true}).eq('email',email);
  }

  msg.className='msg-criar ok';msg.textContent=`✓ Usuário ${nome} criado com sucesso!`;
  document.getElementById('n-nome').value='';
  document.getElementById('n-email').value='';
  document.getElementById('n-senha').value='';
  document.getElementById('n-trocar-senha').checked=true;
  btn.disabled=false;
  carregarUsuarios();
}

function abrirEdicao(u){
  document.getElementById('e-id').value=u.id;
  document.getElementById('e-email-atual').value=u.email||'';
  document.getElementById('e-nome').value=u.nome;
  document.getElementById('e-email').value=u.email||'';
  document.getElementById('e-perfil').value=u.perfil;
  document.getElementById('e-base').value=u.base||'';
  document.getElementById('e-senha').value='';
  document.getElementById('e-trocar-senha').checked=!!u.deve_trocar_senha;
  document.getElementById('msg-edit').textContent='';
  atualizarBaseEdit();
  const rels=u.relatorios||[];
  document.querySelectorAll('#e-relatorios input').forEach(cb=>{
    cb.checked=rels.includes(cb.value);
  });
  document.getElementById('modal-edit').classList.add('vis');
}
function fecharModal(){document.getElementById('modal-edit').classList.remove('vis');}
function fecharModalFora(e){if(e.target===document.getElementById('modal-edit'))fecharModal();}

async function salvarEdicao(){
  const id=document.getElementById('e-id').value;
  const nome=document.getElementById('e-nome').value.trim();
  const email=document.getElementById('e-email').value.trim();
  const emailAtual=document.getElementById('e-email-atual').value.trim();
  const perfil=document.getElementById('e-perfil').value;
  const base=document.getElementById('e-base').value||null;
  const senha=document.getElementById('e-senha').value;
  const exigirTroca=document.getElementById('e-trocar-senha').checked;
  const rels=[...document.querySelectorAll('#e-relatorios input:checked')].map(c=>c.value);
  const msg=document.getElementById('msg-edit');
  const btn=document.getElementById('btn-salvar');
  if(!nome){msg.className='msg-edit erro';msg.textContent='Nome obrigatório.';return;}
  if(!email){msg.className='msg-edit erro';msg.textContent='E-mail obrigatório.';return;}
  if(senha&&senha.length<6){msg.className='msg-edit erro';msg.textContent='Senha mínima de 6 caracteres.';return;}
  btn.disabled=true;msg.textContent='Salvando...';msg.className='msg-edit';

  const resultado=await chamarAdminFn({action:'update_user',id,nome,email,emailAtual,perfil,base,relatorios:rels,senha});

  if(resultado.error){
    msg.className='msg-edit erro';msg.textContent='Erro: '+resultado.error;btn.disabled=false;return;
  }

  if(resultado.avisos&&resultado.avisos.length){
    msg.className='msg-edit erro';
    msg.textContent='Dados salvos, mas: '+resultado.avisos.join('; ');
    btn.disabled=false;
    carregarUsuarios();
    return;
  }

  await sb.from('usuarios_portal').update({deve_trocar_senha:exigirTroca}).eq('id',id);

  msg.className='msg-edit ok';msg.textContent='✓ Salvo com sucesso!';
  btn.disabled=false;
  carregarUsuarios();
  setTimeout(fecharModal,800);
}

async function toggleAtivo(id,ativo){
  await sb.from('usuarios_portal').update({ativo:!ativo}).eq('id',id);
  carregarUsuarios();
}
</script>
<script src="/controles/auto-logout.js"></script>
