<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBS Serviços Empresariais</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;background:#fff;display:flex;align-items:center;justify-content:center}

.page{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
.img-wrap{position:relative;display:inline-block;max-width:100%;max-height:100%}
.img-wrap img{display:block;max-width:100vw;max-height:100vh;width:auto;height:auto}

.nav-overlay{position:absolute;top:1%;right:0;display:flex;align-items:center;gap:1vw;
  padding-right:2vw}
.nav-overlay a{color:#1a4a1a;text-decoration:none;font-size:.85vw;font-weight:500}
.nav-overlay a:hover{text-decoration:underline}
.nav-overlay .btn-link{font-weight:700;border:2px solid #1a4a1a;padding:.4vw 1.1vw;
  border-radius:6px;text-decoration:none}
.nav-overlay .btn-link:hover{background:#1a4a1a;color:#fff}

@media(max-width:700px){
  .nav-overlay{gap:8px;padding-right:10px;top:6px}
  .nav-overlay a{font-size:10px}
  .nav-overlay .btn-link{padding:4px 8px}
}
</style>
</head>
<body>

<div class="page">
  <div class="img-wrap">
    <img src="principal.png" alt="GBS Serviços — 27 anos. Qualidade que gera confiança, Segurança como um valor, Experiência que faz a diferença, Eficiência que gera resultados, Responsabilidade em todas as etapas. Qualidade com segurança é o nosso forte.">
    <div class="nav-overlay">
      <a href="#">A empresa</a>
      <a href="#">Segurança</a>
      <a class="btn-link" href="#">Leiturista</a>
      <a class="btn-link" href="portal.html">Controles</a>
    </div>
  </div>
</div>

</body>
</html>
